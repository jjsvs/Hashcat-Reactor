name: Build installers

# Runs when you push a version tag, e.g.:  git tag v1.0.10 && git push origin v1.0.10
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # needed to create the GitHub Release

jobs:
  build:
    name: Build (${{ matrix.artifact }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-2022
            artifact: windows
          - os: ubuntu-latest
            artifact: linux
          - os: macos-latest      # Apple Silicon (arm64); add macos-13 for Intel
            artifact: macos
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Linux packaging tools
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y fakeroot dpkg

      # Keep the installer version in sync with the pushed tag (strips the leading "v").
      - name: Sync version to tag
        shell: bash
        run: npm version "${GITHUB_REF_NAME#v}" --no-git-tag-version --allow-same-version

      # Installs root deps; postinstall also installs backend deps and rebuilds
      # node-pty (native module) against Electron for this OS.
      - name: Install dependencies
        run: npm install

      - name: Build frontend
        run: npm run build

      - name: Package app (electron-builder)
        run: npx electron-builder --publish never

      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: installers-${{ matrix.artifact }}
          if-no-files-found: error
          path: |
            dist/*.exe
            dist/*.dmg
            dist/*.zip
            dist/*.AppImage
            dist/*.deb

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all installers
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create / update release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
          fail_on_unmatched_files: true
